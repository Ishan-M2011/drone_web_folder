<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Drone Mission Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #status { font-weight: bold; margin-bottom: 20px; }
        .connected { color: #00ff00; }
        .disconnected { color: #ff3333; }
        .container { position: relative; width: 480px; height: 360px; margin: 0 auto; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        #streamView { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        #canvasOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #loadingOverlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Live Drone Mission Control</h1>
    <div id="status">Status: <span id="statusText" class="disconnected">Loading AI Model...</span></div>

    <div class="container">
        <img id="streamView" src="" alt="Live feed">
        <canvas id="canvasOverlay" width="480" height="360"></canvas>
        <div id="loadingOverlay">Initializing Object Detection AI...</div>
    </div>

    <script>
        const socket = io();
        const statusText = document.getElementById('statusText');
        const streamView = document.getElementById('streamView');
        const canvas = document.getElementById('canvasOverlay');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        let aiModel = null;
        let currentPredictions = [];

        // 1. Load AI Model
        cocoSsd.load().then(model => {
            aiModel = model;
            loadingOverlay.style.display = 'none';
            statusText.textContent = 'Waiting for Pi...';
            // Start the background AI processing loop
            runAI();
        });

        socket.on('connect', () => {
            if (aiModel) statusText.textContent = 'Connected to Server';
            statusText.className = 'connected';
        });

        socket.on('disconnect', () => {
            statusText.textContent = 'Disconnected';
            statusText.className = 'disconnected';
        });

        // 2. Handle incoming binary frames (Instantly renders, zero blocking)
        socket.on('response_back', function(data) {
            const blob = new Blob([data.image], { type: 'image/jpeg' });
            // Clean up old object URLs to prevent browser memory leaks
            if (streamView.src) {
                URL.revokeObjectURL(streamView.src);
            }
            streamView.src = URL.createObjectURL(blob);
        });

        // 3. Fast Video Render Loop (Runs at 60 FPS)
        streamView.onload = function() {
            // Draw the camera image onto the canvas instantly
            ctx.drawImage(streamView, 0, 0, canvas.width, canvas.height);

            // Draw whatever the latest AI predictions are without waiting for new calculations
            currentPredictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, width, height);

                ctx.fillStyle = '#00ff00';
                const textWidth = ctx.measureText(prediction.class).width;
                ctx.fillRect(x, y - 21, textWidth + 30, 21);

                ctx.fillStyle = '#000000';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText(`${prediction.class} (${Math.round(prediction.score * 100)}%)`, x + 5, y - 6);
            });
        };

        // 4. Background Asynchronous AI Loop
        async function runAI() {
            if (aiModel && streamView.src) {
                try {
                    // Calculate predictions asynchronously in the background
                    currentPredictions = await aiModel.detect(canvas);
                } catch (err) {
                    console.error("AI error:", err);
                }
            }
            // Request the next calculation frame immediately when ready, without blocking the UI
            requestAnimationFrame(runAI);
        }
    </script>
</body>
</html>
