<!DOCTYPE html>
<html>
<head>
    <title>Live Drone AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; }
        img { width: 640px; border: 2px solid #00ff00; }
    </style>
</head>
<body>
    <h1>Live AI Feed</h1>
    <img id="stream" src="" />
    <script>
        const socket = io();
        socket.on('ai_stream', function(data) {
            document.getElementById('stream').src = 'data:image/jpeg;base64,' + data.image;
        });
    </script>
</body>
</html>
